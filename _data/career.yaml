  company: InfluxData
  title: Site Reliability Engineer
  description: |
     InfluxData is a US startup based in San Francisco. It develops open-source
     tools to manage time series data. InfluxDB is the database and was the first product delivered.
     It builds a full solution around monitoring and metrics: Kapacitor (downsampling and alerting),
     Telegraf (collector), and Chronograf (dashboards and UI) are the other parts of the stack.
     I worked as a Site Reliability Engineer mainly on the InfluxCloud product. I developed the
     backend that managed EC2 services on AWS and containers to spin up and manage
     clusters on our IaaS offering. Since early 2018, I helped design and
     implement the new SaaS called InfluxCloud v2, which uses modern tools such
     as Kubernetes. In September 2019, I started working as part of the compute
     team to develop an elastic and highly scalable task system to empower
     InfluxCloud with long-running processes, batch jobs, and data analysis.
